global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: aicb-day23-lab
    env: lab

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'inference-api'
    static_configs:
      - targets: ['app:8000']
    metrics_path: /metrics

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Day 19 vector-store integration (stub on host:9101)
  - job_name: 'day19-vector-store'
    static_configs:
      - targets: ['172.17.0.1:9101']
    metrics_path: /metrics

  # Day 20 model-serving integration (stub on host:9102)
  - job_name: 'day20-llamacpp'
    static_configs:
      - targets: ['172.17.0.1:9102']
    metrics_path: /metrics

  # Day 16 cloud node_exporter (stub on host:9103)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['172.17.0.1:9103']
    metrics_path: /metrics

  # Day 17 Airflow StatsD (stub on host:9104)
  - job_name: 'airflow-statsd'
    static_configs:
      - targets: ['172.17.0.1:9104']
    metrics_path: /metrics

  # Day 18 Spark (stub on host:9105)
  - job_name: 'spark'
    static_configs:
      - targets: ['172.17.0.1:9105']
    metrics_path: /metrics

  # Day 22 DPO eval (stub on host:9106)
  - job_name: 'day22-dpo'
    static_configs:
      - targets: ['172.17.0.1:9106']
    metrics_path: /metrics
